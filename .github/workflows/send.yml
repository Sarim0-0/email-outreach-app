name: Send outreach batch

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview without sending"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SHEET_URL: ${{ vars.SHEET_URL }}
      SHEET_ID: ${{ vars.SHEET_ID }}
      CONTACTS_SHEET_NAME: ${{ vars.CONTACTS_SHEET_NAME }}
      EMAIL_COLUMN: ${{ vars.EMAIL_COLUMN }}
      CONTROL_SHEET_NAME: ${{ vars.CONTROL_SHEET_NAME }}
      ANALYTICS_SHEET_NAME: ${{ vars.ANALYTICS_SHEET_NAME }}
      SENDER_NAME: ${{ vars.SENDER_NAME }}
      EMAIL_SUBJECT: ${{ vars.EMAIL_SUBJECT }}
      EMAIL_TEMPLATE_PATH: ${{ vars.EMAIL_TEMPLATE_PATH }}
      CAMPAIGN_TEMPLATE_PATHS: ${{ vars.CAMPAIGN_TEMPLATE_PATHS }}
      ATTACHMENT_PATH: ${{ vars.ATTACHMENT_PATH }}
      TIMEZONE: ${{ vars.TIMEZONE }}
      BATCH_SIZE: ${{ vars.BATCH_SIZE }}
      DAILY_SEND_CAP: ${{ vars.DAILY_SEND_CAP }}
      MIN_DELAY_MINUTES: ${{ vars.MIN_DELAY_MINUTES }}
      MAX_DELAY_MINUTES: ${{ vars.MAX_DELAY_MINUTES }}
      GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install -r requirements.txt
      - name: Send batch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m outreach.sender --config config.json --dry-run
          else
            python -m outreach.sender --config config.json
          fi
