name: Check replies and bounces

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SHEET_URL: ${{ vars.SHEET_URL }}
      SHEET_ID: ${{ vars.SHEET_ID }}
      CONTACTS_SHEET_NAME: ${{ vars.CONTACTS_SHEET_NAME }}
      EMAIL_COLUMN: ${{ vars.EMAIL_COLUMN }}
      CONTROL_SHEET_NAME: ${{ vars.CONTROL_SHEET_NAME }}
      ANALYTICS_SHEET_NAME: ${{ vars.ANALYTICS_SHEET_NAME }}
      TIMEZONE: ${{ vars.TIMEZONE }}
      GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install -r requirements.txt
      - run: python -m outreach.check_replies --config config.json
